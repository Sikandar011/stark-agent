<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Stark — Agente AI privato." />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stark" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <title>Stark</title>

  <!-- Google Fonts: Syne (display) + DM Mono (monospace body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13161b;
      --border:    #1e2229;
      --text:      #c8cdd6;
      --text-dim:  #4a5162;
      --accent:    #00f0ff;
      --accent-dim: rgba(0, 240, 255, 0.08);
      --accent-glow: 0 0 8px rgba(0, 240, 255, 0.6), 0 0 24px rgba(0, 240, 255, 0.25);
      --radius:    10px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ─── Layout ────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ─── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--accent);
      text-shadow: 0 0 8px rgba(0,240,255,0.5);
    }

    .status-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-left: auto;
    }

    .status-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Pallino di stato */
    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }

    #status-dot.idle {
      background: #2a8a55;
      box-shadow: 0 0 6px rgba(42,200,100,0.5);
    }

    #status-dot.processing {
      background: var(--accent);
      animation: pulse-dot 1.1s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 4px rgba(0,240,255,0.4); opacity: 1; }
      50%       { box-shadow: 0 0 14px rgba(0,240,255,0.9); opacity: 0.7; }
    }

    /* ─── Chat area ─────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Messaggi */
    .message {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-items: flex-end; }
    .message.assistant { align-items: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--accent-dim);
      border: 1px solid rgba(0,240,255,0.18);
      color: #e0e8f0;
      border-bottom-right-radius: 3px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .sender {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 4px;
    }

    /* ─── Barra macro ───────────────────────────────────── */
    #macro-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
    }

    #macro-bar::-webkit-scrollbar { display: none; }

    .macro-btn {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 7px 13px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .macro-btn:active {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--accent-glow);
    }

    /* ─── Input area ────────────────────────────────────── */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 12px 20px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    #user-input::placeholder { color: var(--text-dim); }

    #user-input:focus {
      border-color: rgba(0,240,255,0.3);
    }

    #send-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #send-btn:active {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--accent-glow);
    }

    #send-btn svg { pointer-events: none; }

    /* ─── Typing indicator ──────────────────────────────── */
    .typing-indicator .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-indicator .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.1s ease-in-out infinite;
    }

    .typing-indicator .dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">

    <header>
      <div class="logo">ST<span>A</span>RK</div>
      <div class="status-wrap">
        <span class="status-label" id="status-text">In attesa</span>
        <div id="status-dot"></div>
      </div>
    </header>

    <div id="chat"></div>

    <div id="macro-bar">
      <button class="macro-btn" data-macro="sintetizza">⬡ Sintetizza</button>
      <button class="macro-btn" data-macro="codice">⬡ Analizza Codice</button>
      <button class="macro-btn" data-macro="correggi">⬡ Correggi Testo</button>
    </div>

    <div id="input-area">
      <textarea
        id="user-input"
        placeholder="Scrivi un messaggio…"
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" aria-label="Invia">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
